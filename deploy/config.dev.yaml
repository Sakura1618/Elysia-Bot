runtime:
  environment: development
  log_level: debug
  http_port: 8080
  sqlite_path: data/dev/runtime.sqlite
  smoke_store_backend: sqlite # set to postgres for v0 smoke-path event/idempotency verification only
  postgres_dsn: ""
  scheduler_interval_ms: 100
  bot_instances:
    - id: adapter-onebot-demo
      adapter: onebot
      source: onebot
      platform: onebot/v11
      demo_path: /demo/onebot/message

ai_chat:
  provider: mock # switch to openai_compat for the current narrow real-provider path
  endpoint: https://api.openai.com/v1/chat/completions # https required except localhost/loopback dev endpoints
  model: gpt-4.1-mini
  request_timeout_ms: 30000

secrets:
  webhook_token_ref: BOT_PLATFORM_WEBHOOK_TOKEN
  ai_chat_api_key_ref: BOT_PLATFORM_AI_CHAT_API_KEY # required when ai_chat.provider=openai_compat

operator_auth:
  # Formal local operator entry path for console read and current /demo operator writes.
  # Authorization: Bearer <token> only binds a request to a configured actor_id.
  # This is a local bearer baseline, not JWT parsing, SSO, or a login product surface.
  tokens:
    - id: console-main
      actor_id: admin-user
      token_ref: BOT_PLATFORM_OPERATOR_TOKEN
    - id: config-main
      actor_id: config-operator
      token_ref: BOT_PLATFORM_OPERATOR_CONFIG_TOKEN
    - id: job-main
      actor_id: job-operator
      token_ref: BOT_PLATFORM_OPERATOR_JOB_TOKEN
    - id: schedule-main
      actor_id: schedule-admin
      token_ref: BOT_PLATFORM_OPERATOR_SCHEDULE_TOKEN
    - id: viewer-main
      actor_id: viewer-user
      token_ref: BOT_PLATFORM_OPERATOR_VIEWER_TOKEN

rbac:
  # Actor IDs, roles, permissions, and plugin scope still resolve from persisted snapshot state.
  # X-Bot-Platform-Actor remains only as a compatibility fallback when operator_auth.tokens is unconfigured.
  console_read_permission: console:read
  actor_roles:
    admin-user: [admin, console-viewer]
    config-operator: [plugin-config-operator, console-viewer]
    job-operator: [job-operator, console-viewer]
    runtime-job-runner: [runtime-job-runner]
    schedule-admin: [schedule-operator, console-viewer]
    viewer-user: [console-viewer]
  policies:
    console-viewer:
      permissions: [console:read]
      plugin_scope: ["console"]
    admin:
      permissions: [plugin:enable, plugin:disable, plugin:rollout]
      plugin_scope: ["*"]
    plugin-config-operator:
      permissions: [plugin:config]
      plugin_scope: ["plugin-echo"]
    job-operator:
      permissions: [job:retry]
      plugin_scope: ["*"]
    runtime-job-runner:
      permissions: [job:run]
      plugin_scope: ["plugin-ai-chat"]
    schedule-operator:
      permissions: [schedule:cancel]
      plugin_scope: ["*"]
